<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Local SERP Side Panel</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <div id="active-border" class="active-border"></div>
    <header class="app-header">
      <h1>Local SERP</h1>
      <span id="status-pill" class="pill pill-off">OFF</span>
    </header>

    <section class="toggle-row">
      <label class="switch">
        <input type="checkbox" id="enable-toggle" />
        <span class="slider"></span>
      </label>
      <div>
        <div class="toggle-label" id="toggle-label">Spoof Location</div>
        <div class="muted small" id="toggle-sub">Off</div>
      </div>
    </section>

    <section class="section">
      <h2>Location</h2>
      <div class="field">
        <label for="address">Address</label>
        <div class="row">
          <input type="text" id="address" placeholder="Times Square, New York" autocomplete="off" />
          <button id="geocode-btn" class="btn">Geocode</button>
        </div>
        <div class="error" id="address-error" hidden></div>
      </div>
      <div class="row two">
        <div class="field">
          <label for="lat">Latitude</label>
          <input type="number" id="lat" step="0.0000001" placeholder="40.758" />
        </div>
        <div class="field">
          <label for="lng">Longitude</label>
          <input type="number" id="lng" step="0.0000001" placeholder="-73.9855" />
        </div>
      </div>
      <div class="row">
        <button id="reverse-btn" class="btn btn-ghost">Reverse geocode</button>
      </div>
    </section>

    <section class="section">
      <h2>Language &amp; country</h2>
      <div class="row two">
        <div class="field">
          <label for="hl">hl (interface)</label>
          <select id="hl">
            <option value="en">en</option>
            <option value="es">es</option>
            <option value="fr">fr</option>
            <option value="de">de</option>
            <option value="it">it</option>
            <option value="pt">pt</option>
            <option value="ja">ja</option>
            <option value="zh-CN">zh-CN</option>
            <option value="ru">ru</option>
            <option value="ar">ar</option>
            <option value="__custom__">Custom…</option>
          </select>
          <input type="text" id="hl-custom" placeholder="e.g. nl" hidden />
        </div>
        <div class="field">
          <label for="gl">gl (country)</label>
          <select id="gl">
            <option value="us">us</option>
            <option value="gb">gb</option>
            <option value="ca">ca</option>
            <option value="au">au</option>
            <option value="de">de</option>
            <option value="fr">fr</option>
            <option value="es">es</option>
            <option value="it">it</option>
            <option value="mx">mx</option>
            <option value="br">br</option>
            <option value="in">in</option>
            <option value="jp">jp</option>
            <option value="nz">nz</option>
            <option value="__custom__">Custom…</option>
          </select>
          <input type="text" id="gl-custom" placeholder="e.g. nl" hidden />
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Presets</h2>
      <div class="row">
        <select id="preset-select">
          <option value="">Load preset…</option>
        </select>
        <button id="save-preset-btn" class="btn">Save as preset</button>
      </div>
      <details class="preset-manager">
        <summary>Manage presets</summary>
        <ul id="preset-list" class="preset-list"></ul>
      </details>
    </section>

    <section class="section">
      <h2>SERP tools</h2>
      <div class="field inline">
        <label>
          <input type="checkbox" id="serp-counter-toggle" />
          Number organic results on Google SERPs
        </label>
      </div>
      <div class="muted small">
        Continues across pagination (page 2 starts at #11).
      </div>
    </section>

    <section class="section">
      <details id="advanced">
        <summary>Advanced</summary>
        <div class="field">
          <label for="radius">Radius (meters)</label>
          <input type="number" id="radius" min="-1" step="1" value="65000" />
        </div>
        <div class="field inline">
          <label>
            <input type="checkbox" id="exact-mode" />
            Exact-coordinate mode (role=USER_SPECIFIED_FOR_REQUEST, radius=-1)
          </label>
        </div>
        <div class="row two">
          <div class="field">
            <label for="role">role override</label>
            <input type="text" id="role" placeholder="CURRENT_LOCATION" />
          </div>
          <div class="field">
            <label for="producer">producer override</label>
            <input type="text" id="producer" placeholder="DEVICE_LOCATION" />
          </div>
        </div>
        <div class="field">
          <label for="google-key">Google Geocoding API key (optional)</label>
          <input type="password" id="google-key" placeholder="AIza…" autocomplete="off" />
        </div>
        <div class="field">
          <label for="uule-preview">UULE header being injected</label>
          <textarea id="uule-preview" rows="4" readonly></textarea>
        </div>
        <div class="field">
          <label for="uule-body">UULE body (decoded)</label>
          <textarea id="uule-body" rows="6" readonly></textarea>
        </div>
      </details>
    </section>

    <div id="toast" class="toast" hidden></div>

    <footer class="app-footer">
      <p>
        Based on the UULE v2 / X-Geo research by
        <a href="https://valentin.app/uule.html" target="_blank" rel="noopener">Valentin Pletzer</a>.
        Original MV2 extension:
        <a href="https://github.com/VorticonCmdr/gslocation" target="_blank" rel="noopener">GS Location Changer</a>.
      </p>
      <p>
        <a href="https://github.com/sam-thencan/search-location" target="_blank" rel="noopener">Repo</a>
      </p>
    </footer>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
